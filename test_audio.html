<!DOCTYPE html>
<html>
<head><title>Codec support test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>body{font-family:monospace;padding:12px;font-size:13px;}</style>
</head>
<body>
<pre id="log">Testing...</pre>
<script>
const log = (s) => { document.getElementById('log').textContent += s + '\n'; }

const mimes = [
  'video/mp4;codecs=avc1.64002A,mp4a.40.2',
  'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
  'video/mp4;codecs=avc1.42E01E',
  'video/mp4',
  'video/webm;codecs=vp9,opus',
  'video/webm;codecs=vp8,opus',
  'video/webm',
];
log('=== MediaRecorder MIME support ===');
mimes.forEach(m => {
  try { log((MediaRecorder.isTypeSupported(m) ? 'OK  ' : 'NO  ') + m); }
  catch(e) { log('ERR ' + m); }
});

log('\n=== AudioEncoder ===');
if (!('AudioEncoder' in window)) {
  log('AudioEncoder: NOT available');
} else {
  log('AudioEncoder: available');
  const cfgs = [
    { codec: 'mp4a.40.2', sampleRate: 44100, numberOfChannels: 2, bitrate: 128000 },
    { codec: 'mp4a.40.2', sampleRate: 48000, numberOfChannels: 2, bitrate: 128000 },
    { codec: 'mp4a.40.2', sampleRate: 44100, numberOfChannels: 1, bitrate: 128000 },
    { codec: 'mp4a.40.5', sampleRate: 44100, numberOfChannels: 2, bitrate: 128000 },
  ];
  (async () => {
    for (const cfg of cfgs) {
      try {
        const sup = await AudioEncoder.isConfigSupported(cfg);
        const res = sup.config || {};
        log((sup.supported?'OK':'NO') + ' sr=' + cfg.sampleRate + ' ch=' + cfg.numberOfChannels
          + ' codec=' + cfg.codec + ' → resolved ch=' + res.numberOfChannels + ' sr=' + res.sampleRate);
      } catch(e) { log('ERR: ' + e); }
    }
    log('\nDone.');
  })();
}
</script>
</body>
</html>
