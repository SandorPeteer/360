<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000">
    <title>KANDÓ 360 Booth</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* ── TELJES KÉPERNYŐS PREVIEW ── */
        #app {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: #000;
        }
        #preview {
            /* canvas: mindig 9:16, cover-illeszkedés a képernyőre */
            display: block;
            max-width: 100vw;
            max-height: 100dvh;
            object-fit: contain;
        }

        /* ── REC GOMB ── */
        #btnRecord {
            position: fixed;
            bottom: max(32px, env(safe-area-inset-bottom, 32px));
            left: 50%;
            transform: translateX(-50%);
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 5px solid #fff;
            background: #e00;
            cursor: pointer;
            z-index: 50;
            transition: transform .1s, background .2s;
            -webkit-tap-highlight-color: transparent;
        }
        #btnRecord:active { transform: translateX(-50%) scale(.9); }
        #btnRecord.recording { background: #555; }
        #btnRecord.recording::after {
            content: '';
            position: absolute; inset: 18px;
            background: #fff;
            border-radius: 4px;
        }
        #btnRecord:not(.recording)::after {
            content: '';
            position: absolute; inset: 14px;
            background: #fff;
            border-radius: 50%;
        }

        /* ── ADMIN GOMB (jobb felső sarok) ── */
        #btnAdmin {
            position: fixed; top: max(16px, env(safe-area-inset-top, 16px)); right: 16px;
            width: 44px; height: 44px;
            border-radius: 10px;
            background: rgba(255,255,255,.15);
            border: 1px solid rgba(255,255,255,.3);
            color: #fff; font-size: 20px;
            cursor: pointer; z-index: 50;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── STATUS BADGE ── */
        #statusBadge {
            position: fixed; top: max(16px, env(safe-area-inset-top, 16px)); left: 16px;
            background: rgba(0,0,0,.6);
            color: #0f0; font-size: 12px; font-weight: 700;
            padding: 5px 10px; border-radius: 20px;
            letter-spacing: .05em; text-transform: uppercase;
            z-index: 50; display: none;
        }
        #statusBadge.visible { display: block; }
        #statusBadge.rec { color: #f44; }

        /* ── VISSZASZÁMLÁLÁS ── */
        #countdown {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 30vw; font-weight: 900; color: #fff;
            text-shadow: 0 0 60px rgba(0,0,0,.8);
            z-index: 60; pointer-events: none;
            opacity: 0; transition: opacity .15s;
        }
        #countdown.visible { opacity: 1; }

        /* ── START OVERLAY (első indítás) ── */
        #startOverlay {
            position: fixed; inset: 0;
            background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px; z-index: 100;
        }
        #startOverlay.hidden { display: none; }
        #startOverlay h1 {
            color: #fff; font-size: 28px; letter-spacing: .1em;
            text-transform: uppercase; text-align: center;
        }
        #startOverlay p { color: #aaa; font-size: 14px; text-align: center; padding: 0 30px; }
        #btnStart {
            width: min(320px, 80vw); height: 70px;
            border-radius: 16px; border: none;
            background: #e00; color: #fff;
            font-size: 22px; font-weight: 800; letter-spacing: .05em;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── ADMIN DRAWER ── */
        #adminBackdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 70; opacity: 0; pointer-events: none;
            transition: opacity .2s;
        }
        #adminBackdrop.open { opacity: 1; pointer-events: auto; }
        #adminDrawer {
            position: fixed; top: 0; right: -100%;
            width: min(340px, 92vw); height: 100dvh;
            background: #111; color: #eee;
            z-index: 80; padding: 20px;
            overflow-y: auto;
            transition: right .25s ease;
        }
        #adminDrawer.open { right: 0; }
        #adminDrawer h2 { font-size: 16px; letter-spacing: .08em; text-transform: uppercase; color: #0d9; margin-bottom: 16px; }
        .admin-row { margin-bottom: 14px; }
        .admin-row label { display: block; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
        .admin-row select,
        .admin-row input[type="file"],
        .admin-row input[type="number"] {
            width: 100%; padding: 8px; border-radius: 8px;
            border: 1px solid #333; background: #222; color: #eee;
            font-size: 13px;
        }
        .admin-row input[type="range"] { width: 100%; }
        #adminClose {
            float: right; background: transparent; border: 1px solid #444;
            color: #eee; width: 32px; height: 32px; border-radius: 8px;
            font-size: 16px; cursor: pointer;
        }
        #adminLog { font-size: 11px; color: #666; margin-top: 8px; line-height: 1.5; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.2.2/build/mp4-muxer.js"
            onerror="this.onerror=null;this.src='https://unpkg.com/mp4-muxer@5.2.2/build/mp4-muxer.js'"></script>
</head>
<body>

<!-- START OVERLAY -->
<div id="startOverlay">
    <h1>KANDÓ 360 Booth</h1>
    <p>Kamera és mikrofon engedély szükséges</p>
    <button id="btnStart">INDÍTÁS</button>
</div>

<!-- FŐ APP -->
<div id="app">
    <canvas id="preview"></canvas>
</div>

<!-- UI ELEMEK -->
<div id="statusBadge">REC ●</div>
<div id="countdown"></div>
<button id="btnRecord" title="Felvétel"></button>
<button id="btnAdmin" title="Beállítások">⚙️</button>

<!-- ADMIN DRAWER -->
<div id="adminBackdrop"></div>
<div id="adminDrawer">
    <button id="adminClose">✕</button>
    <h2>Beállítások</h2>

    <div class="admin-row">
        <label>Kamera</label>
        <select id="camSelect"></select>
    </div>
    <div class="admin-row">
        <label>Overlay PNG (alapért.: KANDO_01.png)</label>
        <input type="file" id="overlayFile" accept="image/png">
    </div>
    <div class="admin-row">
        <label>Zene (alapért.: beégetett .m4a)</label>
        <input type="file" id="musicFile" accept="audio/*,.m4a,.mp3,.aac">
    </div>
    <div class="admin-row">
        <label>Visszaszámlálás (mp)</label>
        <input type="number" id="countdownSec" value="3" min="0" max="10">
    </div>
    <div class="admin-row">
        <label>Google Drive feltöltési URL (Apps Script webhook)</label>
        <input type="text" id="driveWebhook" placeholder="https://script.google.com/...">
    </div>
    <div id="adminLog"></div>
</div>

<script>
'use strict';

// ── KONFIG ──────────────────────────────────────────────────────────────────
const OUT_W = 720;
const OUT_H = 1280;
const TARGET_FPS = 60;
const DEFAULT_OVERLAY = 'KANDO_01.png';
const DEFAULT_AUDIO   = 'Lady Gaga - Abracadabra (Dj Dark Remix) [Htz_v_xiIRc].m4a';

// ── ÁLLAPOT ─────────────────────────────────────────────────────────────────
let cameraStream   = null;
let isRecording    = false;
let recorder       = null;          // WebCodecsRecorder | null
let mrFallback     = null;          // MediaRecorder | null (Safari fallback)
let mrChunks       = [];
let audioBuffer    = null;          // dekódolt AudioBuffer (zene)
let audioFileName  = '';
let recAudioCtx    = null;
let recAudioSrcs   = [];
let drawRaf        = 0;
let countdownTimer = null;
let useWebCodecs   = false;
let recBytes       = 0;

const overlayImg = new Image();
let overlayReady = false;
let overlayOk    = false;

// ── DOM ──────────────────────────────────────────────────────────────────────
const canvas       = document.getElementById('preview');
const ctx          = canvas.getContext('2d');
const startOverlay = document.getElementById('startOverlay');
const btnStart     = document.getElementById('btnStart');
const btnRecord    = document.getElementById('btnRecord');
const btnAdmin     = document.getElementById('btnAdmin');
const adminDrawer  = document.getElementById('adminDrawer');
const adminBackdrop= document.getElementById('adminBackdrop');
const adminClose   = document.getElementById('adminClose');
const statusBadge  = document.getElementById('statusBadge');
const countdownEl  = document.getElementById('countdown');
const camSelect    = document.getElementById('camSelect');
const overlayFile  = document.getElementById('overlayFile');
const musicFile    = document.getElementById('musicFile');
const countdownSec = document.getElementById('countdownSec');
const driveWebhook = document.getElementById('driveWebhook');
const adminLog     = document.getElementById('adminLog');

const liveVideo = document.createElement('video');
liveVideo.autoplay = true; liveVideo.muted = true; liveVideo.playsInline = true;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function log(msg) {
    console.log('[booth]', msg);
    adminLog.textContent = msg;
}

function setStatus(text, cls) {
    statusBadge.textContent = text;
    statusBadge.className = 'visible' + (cls ? ` ${cls}` : '');
}
function hideStatus() { statusBadge.className = ''; }

// canvas méret fix 9:16, CSS scale a képernyőre
function fitCanvas() {
    canvas.width  = OUT_W;
    canvas.height = OUT_H;
    const scaleW = window.innerWidth  / OUT_W;
    const scaleH = window.innerHeight / OUT_H;
    const scale  = Math.min(scaleW, scaleH);
    canvas.style.width  = `${OUT_W * scale}px`;
    canvas.style.height = `${OUT_H * scale}px`;
}

// ── OVERLAY ──────────────────────────────────────────────────────────────────
function loadOverlay(src, label) {
    overlayReady = false; overlayOk = false;
    overlayImg.onload  = () => { overlayReady = true; overlayOk = true; log(`Overlay: ${label}`); };
    overlayImg.onerror = () => { overlayReady = true; overlayOk = false; log(`Overlay nem töltött: ${label}`); };
    overlayImg.src = src;
}

function drawOverlay() {
    if (!overlayOk || !overlayImg.naturalWidth) return;
    ctx.drawImage(overlayImg, 0, 0, OUT_W, OUT_H);
}

// ── ZENE ─────────────────────────────────────────────────────────────────────
async function decodeAudio(arrayBuffer, label) {
    const tmpCtx = new (window.AudioContext || window.webkitAudioContext)();
    try {
        audioBuffer   = await tmpCtx.decodeAudioData(arrayBuffer);
        audioFileName = label;
        log(`Zene: ${label}`);
    } catch(e) {
        log(`Zene dekódolás hiba: ${e.message}`);
    } finally {
        tmpCtx.close();
    }
}

async function loadDefaultAudio() {
    try {
        const res = await fetch(DEFAULT_AUDIO + '?v=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        await decodeAudio(await res.arrayBuffer(), DEFAULT_AUDIO);
    } catch(e) {
        log(`Alapzene nem töltött: ${e.message}`);
    }
}

// Audio mix stream: zene -> MediaStreamDestination -> AudioTrack a felvételhez
function buildAudioTrack() {
    stopAudio();
    if (!audioBuffer) return null;
    recAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const dest   = recAudioCtx.createMediaStreamDestination();
    const src    = recAudioCtx.createBufferSource();
    src.buffer   = audioBuffer;
    src.loop     = true;
    src.connect(dest);
    recAudioSrcs = [src];
    return dest.stream.getAudioTracks()[0] || null;
}

function startAudio() {
    if (recAudioCtx && recAudioCtx.state === 'suspended') recAudioCtx.resume().catch(() => {});
    recAudioSrcs.forEach(s => { try { s.start(0); } catch(_) {} });
}

function stopAudio() {
    recAudioSrcs.forEach(s => { try { s.stop(); } catch(_) {} });
    recAudioSrcs = [];
    if (recAudioCtx) { try { recAudioCtx.close(); } catch(_) {} recAudioCtx = null; }
}

// ── DRAW LOOP ─────────────────────────────────────────────────────────────────
function drawFrame() {
    if (!cameraStream || liveVideo.readyState < 2) return;
    // video cover: 9:16 canvasra
    const vw = liveVideo.videoWidth  || OUT_W;
    const vh = liveVideo.videoHeight || OUT_H;
    const scale = Math.max(OUT_W / vw, OUT_H / vh);
    const dw = vw * scale, dh = vh * scale;
    const dx = (OUT_W - dw) / 2, dy = (OUT_H - dh) / 2;
    ctx.drawImage(liveVideo, dx, dy, dw, dh);
    drawOverlay();
}

function startDraw() {
    stopDraw();
    const loop = () => { drawFrame(); drawRaf = requestAnimationFrame(loop); };
    drawRaf = requestAnimationFrame(loop);
}
function stopDraw() {
    if (drawRaf) { cancelAnimationFrame(drawRaf); drawRaf = 0; }
}

// ── KAMERA ───────────────────────────────────────────────────────────────────
async function startCamera() {
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    const camId = camSelect.value;
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
            video: {
                width:     { ideal: 1920 },
                height:    { ideal: 1080 },
                frameRate: { ideal: TARGET_FPS, min: 30 },
                ...(camId ? { deviceId: { exact: camId } } : { facingMode: 'user' })
            },
            audio: false
        });
    } catch(e) {
        log(`Kamera hiba: ${e.message}`);
        return false;
    }
    liveVideo.srcObject = cameraStream;
    try { await liveVideo.play(); } catch(_) {}
    // Próbáljuk 60fps kicsikarni a track-ból
    const track = cameraStream.getVideoTracks()[0];
    if (track && track.applyConstraints) {
        try {
            await track.applyConstraints({ frameRate: { ideal: TARGET_FPS } });
        } catch(_) {}
    }
    const settings = track ? track.getSettings() : {};
    log(`Kamera: ${settings.width}x${settings.height} @ ${Math.round(settings.frameRate||30)}fps`);
    fitCanvas();
    startDraw();
    btnRecord.disabled = false;
    return true;
}

async function refreshCameraList() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return;
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    const prev = camSelect.value;
    camSelect.innerHTML = '';
    cams.forEach((cam, i) => {
        const opt = document.createElement('option');
        opt.value = cam.deviceId;
        opt.textContent = cam.label || `Kamera ${i+1}`;
        camSelect.appendChild(opt);
    });
    if (prev && [...camSelect.options].some(o => o.value === prev)) camSelect.value = prev;
}

// ── WEBCODECS ELLENŐRZÉS ──────────────────────────────────────────────────────
async function checkWebCodecs() {
    if (!('VideoEncoder' in window) || !('VideoFrame' in window) || typeof Mp4Muxer === 'undefined') {
        useWebCodecs = false;
        log('WebCodecs N/A – MediaRecorder módban fut');
        return;
    }
    // iPad Safari: VideoEncoder megvan, de AudioEncoder és MediaStreamTrackProcessor hiányzik
    // Ezért mindig MediaRecorder-t használunk, ami iPaden is ad hangot
    useWebCodecs = false;
    log('MediaRecorder mód (hang kompatibilis)');
}

// ── RÖGZÍTÉS: MEDIARECORDER ────────────────────────────────────────────────────
function pickMime() {
    const list = [
        'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
        'video/mp4;codecs=avc1.42E01E',
        'video/mp4',
        'video/webm;codecs=vp8,opus',
        'video/webm;codecs=vp9,opus',
        'video/webm'
    ];
    if (!window.MediaRecorder || !MediaRecorder.isTypeSupported) return { mime: 'video/mp4', ext: 'mp4' };
    for (const mime of list) {
        try { if (MediaRecorder.isTypeSupported(mime)) return { mime, ext: mime.startsWith('video/mp4') ? 'mp4' : 'webm' }; } catch(_) {}
    }
    return { mime: '', ext: 'mp4' };
}

async function startRec() {
    if (isRecording || !cameraStream) return;

    const track    = cameraStream.getVideoTracks()[0];
    const settings = track ? track.getSettings() : {};
    const fps      = Math.round(settings.frameRate || 30);
    const bitrate  = Math.max(12_000_000, OUT_W * OUT_H * fps * 0.08);

    fitCanvas();

    const audioTrack = buildAudioTrack();
    const vidStream  = canvas.captureStream(fps);
    if (audioTrack) vidStream.addTrack(audioTrack);

    const { mime, ext } = pickMime();
    try {
        mrFallback = new MediaRecorder(vidStream, { mimeType: mime, videoBitsPerSecond: bitrate });
    } catch(_) {
        try { mrFallback = new MediaRecorder(vidStream); } catch(e) {
            log(`MediaRecorder hiba: ${e.message}`); stopAudio(); return;
        }
    }

    mrChunks = [];
    mrFallback.ondataavailable = e => { if (e.data && e.data.size > 0) mrChunks.push(e.data); recBytes += e.data.size || 0; };
    mrFallback.onstop = () => {
        const blob = new Blob(mrChunks, { type: mime || 'video/mp4' });
        mrChunks = [];
        onRecordingDone(blob, ext);
    };

    mrFallback.start(500); // 500ms chunk-ok
    startAudio();
    isRecording = true;
    btnRecord.classList.add('recording');
    setStatus('REC ●', 'rec');
    log(`Rögzítés: ${mime} @ ${(bitrate/1e6).toFixed(0)}Mbps, ${fps}fps`);
}

function stopRec() {
    if (!isRecording) return;
    isRecording = false;
    btnRecord.classList.remove('recording');
    setStatus('Mentés...', '');
    if (mrFallback) {
        try { mrFallback.stop(); } catch(_) {}
        mrFallback = null;
    }
    stopAudio();
}

// ── VISSZASZÁMLÁLÁS ───────────────────────────────────────────────────────────
function runCountdown(sec, onDone) {
    if (sec <= 0) { onDone(); return; }
    let n = sec;
    countdownEl.textContent = n;
    countdownEl.classList.add('visible');
    countdownTimer = setInterval(() => {
        n--;
        if (n <= 0) {
            clearInterval(countdownTimer);
            countdownEl.classList.remove('visible');
            onDone();
        } else {
            countdownEl.textContent = n;
        }
    }, 1000);
}

// ── FELVÉTEL VÉGE ─────────────────────────────────────────────────────────────
function onRecordingDone(blob, ext) {
    hideStatus();
    log(`Kész: ${(blob.size/1024/1024).toFixed(1)} MB`);

    // Letöltés
    const url  = URL.createObjectURL(blob);
    const now  = new Date();
    const name = `KANDO_360_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}.${ext}`;
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();

    // Google Drive feltöltés (ha van webhook)
    const webhook = driveWebhook.value.trim();
    if (webhook) uploadToDrive(blob, name, webhook, url);
    else setTimeout(() => URL.revokeObjectURL(url), 60000);
}

async function uploadToDrive(blob, filename, webhookUrl, localUrl) {
    setStatus('Drive feltöltés...', '');
    log('Google Drive feltöltés folyamatban...');
    try {
        const reader = new FileReader();
        const base64 = await new Promise((res, rej) => {
            reader.onload  = e => res(e.target.result.split(',')[1]);
            reader.onerror = rej;
            reader.readAsDataURL(blob);
        });
        const res = await fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename, data: base64, mimeType: blob.type })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const result = await res.json();
        log(`Drive: OK – ${result.url || result.id || 'feltöltve'}`);
        hideStatus();
    } catch(e) {
        log(`Drive hiba: ${e.message}`);
        hideStatus();
    } finally {
        setTimeout(() => URL.revokeObjectURL(localUrl), 60000);
    }
}

// ── REC GOMB ─────────────────────────────────────────────────────────────────
btnRecord.disabled = true;
btnRecord.addEventListener('click', () => {
    if (isRecording) {
        if (countdownTimer) { clearInterval(countdownTimer); countdownEl.classList.remove('visible'); }
        stopRec();
        return;
    }
    const sec = parseInt(countdownSec.value, 10) || 0;
    runCountdown(sec, startRec);
});

// ── START OVERLAY ──────────────────────────────────────────────────────────────
btnStart.addEventListener('click', async () => {
    btnStart.disabled = true;
    btnStart.textContent = 'Kamera indítás...';
    // Engedélykérés: video + audio együtt, hogy iOS-en a zene permission meglegyen
    try {
        const tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        tmp.getTracks().forEach(t => t.stop());
    } catch(e) {
        log(`Engedély hiba: ${e.message}`);
        btnStart.disabled = false;
        btnStart.textContent = 'INDÍTÁS';
        return;
    }
    await refreshCameraList();
    const ok = await startCamera();
    if (!ok) {
        btnStart.disabled = false;
        btnStart.textContent = 'INDÍTÁS';
        return;
    }
    startOverlay.classList.add('hidden');
    // Fullscreen kérés (user gesture-ben vagyunk)
    try {
        const el = document.documentElement;
        if (el.requestFullscreen) await el.requestFullscreen({ navigationUI: 'hide' });
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    } catch(_) {}
});

// ── ADMIN DRAWER ──────────────────────────────────────────────────────────────
function openAdmin()  { adminDrawer.classList.add('open'); adminBackdrop.classList.add('open'); }
function closeAdmin() { adminDrawer.classList.remove('open'); adminBackdrop.classList.remove('open'); }
btnAdmin.addEventListener('click', openAdmin);
adminClose.addEventListener('click', closeAdmin);
adminBackdrop.addEventListener('click', closeAdmin);

camSelect.addEventListener('change', () => { if (cameraStream) startCamera(); });

overlayFile.addEventListener('change', () => {
    const file = overlayFile.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => loadOverlay(e.target.result, file.name);
    reader.readAsDataURL(file);
});

musicFile.addEventListener('change', async () => {
    const file = musicFile.files[0];
    if (!file) return;
    try {
        await decodeAudio(await file.arrayBuffer(), file.name);
    } catch(e) { log(`Zene betöltési hiba: ${e.message}`); }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('resize', fitCanvas);
fitCanvas();
checkWebCodecs();
loadOverlay(DEFAULT_OVERLAY + '?v=' + Date.now(), DEFAULT_OVERLAY);
loadDefaultAudio();
</script>
</body>
</html>
