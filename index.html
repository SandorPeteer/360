<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>KANDÓ 360 Booth</title>
    <script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.2.2/build/mp4-muxer.js"
            onerror="this.onerror=null;this.src='https://unpkg.com/mp4-muxer@5.2.2/build/mp4-muxer.js'"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; font-family: system-ui, -apple-system, sans-serif; }

        /* ── PREVIEW ── */
        #wrap {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
        }
        #preview {
            display: block;
            /* méret JS-ből jön, de alapból tele van */
            max-width: 100vw; max-height: 100dvh;
        }

        /* ── REC GOMB – nagy, középre lent ── */
        #btnRecord {
            position: fixed;
            bottom: max(36px, env(safe-area-inset-bottom, 36px));
            left: 50%; transform: translateX(-50%);
            width: 88px; height: 88px; border-radius: 50%;
            border: 5px solid #fff;
            background: #e8000d;
            cursor: pointer; z-index: 50;
            box-shadow: 0 8px 32px rgba(232,0,13,.5);
            transition: transform .12s, box-shadow .12s;
            display: flex; align-items: center; justify-content: center;
        }
        #btnRecord:active { transform: translateX(-50%) scale(.9); box-shadow: 0 4px 16px rgba(232,0,13,.4); }
        /* belső ikon – kör = record, négyzet = stop */
        #btnRecord::after {
            content: '';
            width: 32px; height: 32px;
            background: #fff; border-radius: 50%;
            transition: border-radius .2s;
        }
        #btnRecord.recording { background: #222; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
        #btnRecord.recording::after { border-radius: 5px; width: 28px; height: 28px; }

        /* ── BEÁLLÍTÁSOK GOMB – jobb felső ── */
        #btnSettings {
            position: fixed;
            top: max(18px, env(safe-area-inset-top, 18px)); right: 18px;
            width: 48px; height: 48px; border-radius: 14px;
            background: rgba(255,255,255,.12); border: 1.5px solid rgba(255,255,255,.25);
            color: #fff; font-size: 22px; cursor: pointer; z-index: 50;
            display: flex; align-items: center; justify-content: center;
        }

        /* ── ENCODER BADGE – bal felső ── */
        #encBadge {
            position: fixed;
            top: max(18px, env(safe-area-inset-top, 18px)); left: 18px;
            padding: 5px 11px; border-radius: 20px;
            font-size: 11px; font-weight: 700; letter-spacing: .06em;
            text-transform: uppercase; z-index: 50;
            border: 1.5px solid; display: none;
        }
        #encBadge.hw  { color: #00e676; border-color: #00e676; background: rgba(0,230,118,.12); display: block; }
        #encBadge.mr  { color: #ffb300; border-color: #ffb300; background: rgba(255,179,0,.12); display: block; }

        /* ── STATUS SZÖVEG – alul középen a REC gomb felett ── */
        #statusText {
            position: fixed;
            bottom: calc(max(36px, env(safe-area-inset-bottom, 36px)) + 100px);
            left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,.75); font-size: 14px; font-weight: 600;
            letter-spacing: .04em; text-align: center;
            white-space: nowrap; z-index: 50; pointer-events: none;
        }

        /* ── VISSZASZÁMLÁLÁS ── */
        #countdown {
            position: fixed; inset: 0; z-index: 80; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 38vw; font-weight: 900; color: #fff;
            text-shadow: 0 0 80px rgba(0,0,0,.9);
            opacity: 0; transition: opacity .15s;
        }
        #countdown.on { opacity: 1; }

        /* ── START OVERLAY ── */
        #startOverlay {
            position: fixed; inset: 0; z-index: 100;
            background: #0a0a0a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 24px;
        }
        #startOverlay.gone { display: none; }
        #startOverlay h1 {
            font-size: clamp(26px, 6vw, 42px); font-weight: 900;
            color: #fff; letter-spacing: .08em; text-transform: uppercase;
            text-align: center;
        }
        #startOverlay p { color: #888; font-size: 15px; text-align: center; }
        #btnStart {
            width: min(340px, 82vw); height: 76px;
            border-radius: 20px; border: none;
            background: linear-gradient(135deg, #e8000d, #ff4d00);
            color: #fff; font-size: 24px; font-weight: 900;
            letter-spacing: .06em; cursor: pointer;
            box-shadow: 0 12px 40px rgba(232,0,13,.45);
        }

        /* ── SETTINGS DRAWER ── */
        #settingsBackdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,.6);
            z-index: 60; opacity: 0; pointer-events: none; transition: opacity .2s;
        }
        #settingsBackdrop.on { opacity: 1; pointer-events: auto; }
        #settingsDrawer {
            position: fixed; top: 0; right: -110%;
            width: min(360px, 92vw); height: 100dvh;
            background: #141414; color: #eee;
            z-index: 70; padding: 24px 20px;
            overflow-y: auto; transition: right .25s ease;
        }
        #settingsDrawer.on { right: 0; }
        #settingsDrawer h2 {
            font-size: 13px; letter-spacing: .1em; text-transform: uppercase;
            color: #00e676; margin-bottom: 20px;
        }
        #btnCloseSettings {
            float: right; background: transparent;
            border: 1.5px solid #333; color: #eee;
            width: 34px; height: 34px; border-radius: 10px;
            font-size: 18px; cursor: pointer; margin-top: -4px;
            display: flex; align-items: center; justify-content: center;
        }
        .srow { margin-bottom: 16px; }
        .srow label {
            display: block; font-size: 10px; color: #666;
            text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; font-weight: 700;
        }
        .srow select, .srow input[type="file"], .srow input[type="number"] {
            width: 100%; padding: 9px 10px; border-radius: 10px;
            border: 1.5px solid #2a2a2a; background: #1e1e1e; color: #eee;
            font-size: 13px; appearance: none; -webkit-appearance: none;
        }
        #sLog { font-size: 11px; color: #555; margin-top: 12px; line-height: 1.6; min-height: 16px; }

        /* ── KÉSZ VIDEÓ UI ── */
        #doneOverlay {
            position: fixed; inset: 0; z-index: 90;
            background: rgba(0,0,0,.92);
            display: none; flex-direction: column;
            align-items: center; justify-content: center; gap: 18px;
        }
        #doneOverlay.on { display: flex; }
        #doneOverlay h2 { color: #fff; font-size: 22px; font-weight: 800; }
        #doneOverlay p  { color: #888; font-size: 13px; }
        .done-btn {
            width: min(300px, 80vw); height: 60px; border-radius: 16px; border: none;
            font-size: 18px; font-weight: 800; cursor: pointer; letter-spacing: .04em;
        }
        #btnDownload { background: linear-gradient(135deg,#00c853,#00e676); color: #000; }
        #btnNewRec    { background: #1e1e1e; color: #eee; border: 1.5px solid #333; }
    </style>
</head>
<body>

<!-- PREVIEW CANVAS -->
<div id="wrap"><canvas id="preview"></canvas></div>

<!-- FIXED UI -->
<div id="encBadge">HW H.264</div>
<div id="statusText"></div>
<div id="countdown"></div>
<button id="btnRecord"></button>
<button id="btnSettings">⚙️</button>

<!-- START OVERLAY -->
<div id="startOverlay">
    <h1>KANDÓ<br>360 BOOTH</h1>
    <p>Nyomj a gombra a kamera indításához</p>
    <button id="btnStart">INDÍTÁS</button>
</div>

<!-- KÉSZ VIDEÓ -->
<div id="doneOverlay">
    <h2>✅ Felvétel kész!</h2>
    <p id="doneInfo"></p>
    <button class="done-btn" id="btnDownload">⬇️ LETÖLTÉS</button>
    <button class="done-btn" id="btnNewRec">🔴 ÚJ FELVÉTEL</button>
</div>

<!-- SETTINGS DRAWER -->
<div id="settingsBackdrop"></div>
<div id="settingsDrawer">
    <button id="btnCloseSettings">✕</button>
    <h2>Beállítások</h2>

    <div class="srow">
        <label>Kamera</label>
        <select id="camSelect"></select>
    </div>
    <div class="srow">
        <label>Overlay PNG (alap: KANDO_01.png)</label>
        <input type="file" id="overlayFile" accept="image/png">
    </div>
    <div class="srow">
        <label>Zene (alap: beégetett .m4a)</label>
        <input type="file" id="musicFile" accept="audio/*,.m4a,.mp3,.aac">
    </div>
    <div class="srow">
        <label>Visszaszámlálás (másodperc)</label>
        <input type="number" id="inputCountdown" value="3" min="0" max="10">
    </div>
    <div id="sLog"></div>
</div>

<script>
'use strict';

// ── KONFIG ────────────────────────────────────────────────────────────────────
const OUT_W        = 720;
const OUT_H        = 1280;
const TARGET_FPS   = 60;
const DEFAULT_OVERLAY = 'KANDO_01.png';
const DEFAULT_AUDIO   = 'Lady Gaga - Abracadabra (Dj Dark Remix) [Htz_v_xiIRc].m4a';

// ── ÁLLAPOT ───────────────────────────────────────────────────────────────────
let cameraStream  = null;
let isRecording   = false;
let useHW         = false;   // WebCodecs VideoEncoder elérhető
let hwRecorder    = null;    // HW: { encoder, muxer, rafId }
let mrRecorder    = null;    // SW fallback: MediaRecorder
let mrChunks      = [];
let audioBuffer   = null;
let audioFileName = '';
let recAudioCtx   = null;
let recAudioSrcs  = [];
let drawRafId     = 0;
let cdTimer       = null;
let lastBlob      = null;
let lastExt       = 'mp4';
let recBytes      = 0;

const overlayImg = new Image();
let overlayReady = false;

// ── DOM ───────────────────────────────────────────────────────────────────────
const canvas          = document.getElementById('preview');
const ctx             = canvas.getContext('2d', { alpha: false });
const btnRecord       = document.getElementById('btnRecord');
const btnSettings     = document.getElementById('btnSettings');
const btnStart        = document.getElementById('btnStart');
const startOverlay    = document.getElementById('startOverlay');
const countdown       = document.getElementById('countdown');
const statusText      = document.getElementById('statusText');
const encBadge        = document.getElementById('encBadge');
const settingsBackdrop= document.getElementById('settingsBackdrop');
const settingsDrawer  = document.getElementById('settingsDrawer');
const btnCloseSettings= document.getElementById('btnCloseSettings');
const camSelect       = document.getElementById('camSelect');
const overlayFile     = document.getElementById('overlayFile');
const musicFile       = document.getElementById('musicFile');
const inputCountdown  = document.getElementById('inputCountdown');
const sLog            = document.getElementById('sLog');
const doneOverlay     = document.getElementById('doneOverlay');
const doneInfo        = document.getElementById('doneInfo');
const btnDownload     = document.getElementById('btnDownload');
const btnNewRec       = document.getElementById('btnNewRec');

const liveVideo = Object.assign(document.createElement('video'), {
    autoplay: true, muted: true, playsInline: true
});

// ── LOG ───────────────────────────────────────────────────────────────────────
function log(msg) { sLog.textContent = msg; console.log('[booth]', msg); }
function setStatus(msg) { statusText.textContent = msg; }

// ── CANVAS MÉRET + FIT ────────────────────────────────────────────────────────
function fitPreview() {
    canvas.width  = OUT_W;
    canvas.height = OUT_H;
    const s = Math.min(window.innerWidth / OUT_W, window.innerHeight / OUT_H);
    canvas.style.width  = OUT_W * s + 'px';
    canvas.style.height = OUT_H * s + 'px';
}

// ── OVERLAY ───────────────────────────────────────────────────────────────────
function loadOverlay(src, label) {
    overlayReady = false;
    overlayImg.onload  = () => { overlayReady = true;  log('Overlay: ' + label); };
    overlayImg.onerror = () => { overlayReady = false; log('Overlay nem töltött: ' + label); };
    overlayImg.src = src;
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
async function decodeAudio(ab, label) {
    const tmp = new (window.AudioContext || window.webkitAudioContext)();
    try {
        audioBuffer   = await tmp.decodeAudioData(ab);
        audioFileName = label;
        log('Zene: ' + label);
    } catch(e) { log('Zene dekód hiba: ' + e.message); }
    finally { tmp.close(); }
}

async function loadDefaultAudio() {
    try {
        const r = await fetch(DEFAULT_AUDIO + '?v=' + Date.now(), { cache: 'no-store' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        await decodeAudio(await r.arrayBuffer(), DEFAULT_AUDIO);
    } catch(e) { log('Alapzene nem tölt: ' + e.message); }
}

// audio track a felvételhez (loop, dest)
function buildAudioTrack() {
    stopAudio();
    if (!audioBuffer) return null;
    recAudioCtx     = new (window.AudioContext || window.webkitAudioContext)();
    const dest      = recAudioCtx.createMediaStreamDestination();
    const src       = recAudioCtx.createBufferSource();
    src.buffer      = audioBuffer;
    src.loop        = true;
    src.connect(dest);
    recAudioSrcs    = [src];
    return dest.stream.getAudioTracks()[0] || null;
}
function startAudio() {
    if (!recAudioCtx) return;
    if (recAudioCtx.state === 'suspended') recAudioCtx.resume().catch(() => {});
    recAudioSrcs.forEach(s => { try { s.start(0); } catch(_) {} });
}
function stopAudio() {
    recAudioSrcs.forEach(s => { try { s.stop(); } catch(_) {} });
    recAudioSrcs = [];
    if (recAudioCtx) { try { recAudioCtx.close(); } catch(_) {} recAudioCtx = null; }
}

// ── DRAW LOOP ─────────────────────────────────────────────────────────────────
function drawFrame() {
    if (!cameraStream || liveVideo.readyState < 2) return;
    // cover: kitölti 720×1280-at, levágja ami kilóg
    const vw = liveVideo.videoWidth  || OUT_W;
    const vh = liveVideo.videoHeight || OUT_H;
    const scale = Math.max(OUT_W / vw, OUT_H / vh);
    const dw = vw * scale, dh = vh * scale;
    ctx.drawImage(liveVideo, (OUT_W - dw) / 2, (OUT_H - dh) / 2, dw, dh);
    if (overlayReady && overlayImg.naturalWidth) {
        ctx.drawImage(overlayImg, 0, 0, OUT_W, OUT_H);
    }
}
function startDraw() {
    if (drawRafId) return;
    const loop = () => { drawFrame(); drawRafId = requestAnimationFrame(loop); };
    drawRafId = requestAnimationFrame(loop);
}
function stopDraw() { if (drawRafId) { cancelAnimationFrame(drawRafId); drawRafId = 0; } }

// ── KAMERA ────────────────────────────────────────────────────────────────────
async function startCamera() {
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    const camId = camSelect.value;
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
            video: {
                width:     { ideal: 1920 },
                height:    { ideal: 1080 },
                frameRate: { ideal: TARGET_FPS, min: 30 },
                ...(camId ? { deviceId: { exact: camId } } : { facingMode: 'user' })
            },
            audio: false
        });
    } catch(e) { log('Kamera hiba: ' + e.message); return false; }

    liveVideo.srcObject = cameraStream;
    try { await liveVideo.play(); } catch(_) {}

    // próbáljuk 60fps-re csavarni
    const track = cameraStream.getVideoTracks()[0];
    if (track?.applyConstraints) {
        try { await track.applyConstraints({ frameRate: { ideal: TARGET_FPS } }); } catch(_) {}
    }
    const s = track?.getSettings?.() || {};
    log(`Kamera: ${s.width}×${s.height} @ ${Math.round(s.frameRate||30)}fps`);
    fitPreview();
    startDraw();
    btnRecord.disabled = false;
    return true;
}

async function refreshCams() {
    if (!navigator.mediaDevices?.enumerateDevices) return;
    const devs = await navigator.mediaDevices.enumerateDevices();
    const prev = camSelect.value;
    camSelect.innerHTML = '';
    devs.filter(d => d.kind === 'videoinput').forEach((d, i) => {
        const o = document.createElement('option');
        o.value = d.deviceId;
        o.textContent = d.label || `Kamera ${i+1}`;
        camSelect.appendChild(o);
    });
    if (prev && [...camSelect.options].some(o => o.value === prev)) camSelect.value = prev;
}

// ── WEBCODECS DETEKTÁLÁS ──────────────────────────────────────────────────────
async function detectHW() {
    if (!('VideoEncoder' in window) || !('VideoFrame' in window) || typeof Mp4Muxer === 'undefined') {
        useHW = false; return;
    }
    // Teszteljük hogy tényleg megy-e a HW encoder
    const cfg = {
        codec: 'avc1.64002A', width: OUT_W, height: OUT_H,
        framerate: TARGET_FPS, bitrate: 12_000_000,
        hardwareAcceleration: 'prefer-hardware'
    };
    try {
        const r = await VideoEncoder.isConfigSupported(cfg);
        useHW = !!(r?.supported);
    } catch(_) { useHW = false; }

    if (useHW) {
        encBadge.textContent = 'HW H.264';
        encBadge.className   = 'hw';
    } else {
        encBadge.textContent = 'SW MediaRec';
        encBadge.className   = 'mr';
    }
}

// ── HW FELVÉTEL (WebCodecs + mp4-muxer) ──────────────────────────────────────
async function pickVideoConfig() {
    const profiles = [
        // High profile – legjobb minőség, iPad A13 simán bírja
        'avc1.64002A', 'avc1.640029', 'avc1.64001F',
        // Main profile fallback
        'avc1.4D402A', 'avc1.4D4029',
        // Baseline végső fallback
        'avc1.42E02A', 'avc1.42E01E'
    ];
    const base = {
        width: OUT_W, height: OUT_H,
        framerate: TARGET_FPS, bitrate: 12_000_000,
        bitrateMode: 'variable', latencyMode: 'quality'
    };
    for (const accel of ['prefer-hardware', 'no-preference']) {
        for (const codec of profiles) {
            const cfg = { ...base, codec, hardwareAcceleration: accel };
            try {
                const r = await VideoEncoder.isConfigSupported(cfg);
                if (r?.supported) return r.config || cfg;
            } catch(_) {}
        }
    }
    throw new Error('Nincs támogatott H.264 konfig');
}

async function startHW(audioTrack) {
    const cfg = await pickVideoConfig();

    // audio info a muxerhez – csak ha van AudioEncoder (Chrome)
    const hasAudioEnc = ('AudioEncoder' in window) && (typeof MediaStreamTrackProcessor !== 'undefined');
    const audioInfo = (hasAudioEnc && audioTrack) ? {
        codec: 'aac',
        numberOfChannels: audioTrack.getSettings().channelCount || 2,
        sampleRate: audioTrack.getSettings().sampleRate || 48000
    } : null;

    const muxer = new Mp4Muxer.Muxer({
        target: new Mp4Muxer.ArrayBufferTarget(),
        video: { codec: 'avc', width: OUT_W, height: OUT_H },
        ...(audioInfo ? { audio: audioInfo } : {}),
        fastStart: 'in-memory'
    });

    let frameCount = 0;
    const keyInterval = Math.round(TARGET_FPS * 2);

    const encoder = new VideoEncoder({
        output: (chunk, meta) => {
            try {
                let m = meta;
                if (m?.decoderConfig?.colorSpace == null && m?.decoderConfig) {
                    m = { ...m, decoderConfig: { ...m.decoderConfig } };
                    delete m.decoderConfig.colorSpace;
                }
                muxer.addVideoChunk(chunk, m);
                recBytes += chunk.byteLength || 0;
            } catch(e) { console.warn('[HW] muxer video err:', e); }
        },
        error: e => console.error('[HW] encode err:', e)
    });
    encoder.configure(cfg);

    // Audio encoder – csak Chromeon
    let audioEncoder = null;
    let audioReader  = null;
    if (audioInfo && hasAudioEnc && audioTrack) {
        const audioCfg = {
            codec: 'mp4a.40.2',
            sampleRate: audioInfo.sampleRate,
            numberOfChannels: audioInfo.numberOfChannels,
            bitrate: 128_000
        };
        const sup = await AudioEncoder.isConfigSupported(audioCfg);
        audioEncoder = new AudioEncoder({
            output: (chunk, meta) => { muxer.addAudioChunk(chunk, meta); },
            error: e => console.error('[HW] audio enc err:', e)
        });
        audioEncoder.configure(sup?.config || audioCfg);

        const proc = new MediaStreamTrackProcessor({ track: audioTrack });
        audioReader = proc.readable.getReader();
        (async () => {
            while (true) {
                const { done, value } = await audioReader.read();
                if (done || !hwRecorder) break;
                if (audioEncoder.state === 'configured') {
                    audioEncoder.encode(value);
                    value.close();
                } else { value.close(); break; }
            }
        })();
    }

    // Canvas frame capture loop
    const frameMs = 1000 / TARGET_FPS;
    let lastFrameTs = 0;
    const rafLoop = (ts) => {
        if (!hwRecorder) return;
        if (ts - lastFrameTs >= frameMs) {
            lastFrameTs = ts;
            try {
                const frame = new VideoFrame(canvas, {
                    timestamp: frameCount * (1_000_000 / TARGET_FPS),
                    duration:  1_000_000 / TARGET_FPS
                });
                if (encoder.state === 'configured') {
                    encoder.encode(frame, { keyFrame: frameCount % keyInterval === 0 });
                    frameCount++;
                }
                frame.close();
            } catch(e) { console.warn('[HW] frame err:', e); }
        }
        hwRecorder.rafId = requestAnimationFrame(rafLoop);
    };

    hwRecorder = { encoder, audioEncoder, audioReader, muxer, rafId: 0 };
    hwRecorder.rafId = requestAnimationFrame(rafLoop);
    encBadge.textContent = `HW H.264 ${cfg.codec}`;
    encBadge.className   = 'hw';
    log('HW felvétel: ' + cfg.codec);
}

async function stopHW() {
    if (!hwRecorder) return null;
    const { encoder, audioEncoder, audioReader, muxer, rafId } = hwRecorder;
    hwRecorder = null;
    cancelAnimationFrame(rafId);
    if (audioReader) { try { await audioReader.cancel(); } catch(_) {} }
    if (encoder.state === 'configured') {
        try { await encoder.flush(); encoder.close(); } catch(e) { console.warn('[HW] flush err:', e); }
    }
    if (audioEncoder?.state === 'configured') {
        try { await audioEncoder.flush(); audioEncoder.close(); } catch(_) {}
    }
    muxer.finalize();
    return new Blob([muxer.target.buffer], { type: 'video/mp4' });
}

// ── MR FALLBACK (MediaRecorder) ───────────────────────────────────────────────
function pickMime() {
    const list = [
        'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
        'video/mp4;codecs=avc1.42E01E',
        'video/mp4',
        'video/webm;codecs=vp8,opus',
        'video/webm;codecs=vp9,opus',
        'video/webm'
    ];
    if (!window.MediaRecorder?.isTypeSupported) return { mime: 'video/mp4', ext: 'mp4' };
    for (const mime of list) {
        try { if (MediaRecorder.isTypeSupported(mime)) return { mime, ext: mime.startsWith('video/mp4') ? 'mp4' : 'webm' }; } catch(_) {}
    }
    return { mime: 'video/mp4', ext: 'mp4' };
}

function startMR(audioTrack, fps, bitrate) {
    const vidStream = canvas.captureStream(fps);
    if (audioTrack) vidStream.addTrack(audioTrack);
    const { mime, ext } = pickMime();
    lastExt = ext;
    let mr;
    try { mr = new MediaRecorder(vidStream, { mimeType: mime, videoBitsPerSecond: bitrate }); }
    catch(_) { mr = new MediaRecorder(vidStream); }
    mrChunks = [];
    mr.ondataavailable = e => { if (e.data?.size > 0) { mrChunks.push(e.data); recBytes += e.data.size; } };
    mr.onstop = () => {
        const blob = new Blob(mrChunks, { type: mime });
        mrChunks = [];
        onDone(blob, ext);
    };
    mr.start(500);
    mrRecorder = mr;
    encBadge.textContent = 'MediaRec';
    encBadge.className   = 'mr';
    log('MediaRecorder fallback: ' + mime);
}

// ── FELVÉTEL START / STOP ─────────────────────────────────────────────────────
async function startRec() {
    if (isRecording || !cameraStream) return;
    isRecording = true;
    recBytes = 0;
    doneOverlay.classList.remove('on');

    const track    = cameraStream.getVideoTracks()[0];
    const settings = track?.getSettings?.() || {};
    const fps      = Math.round(settings.frameRate || 30);
    const bitrate  = Math.max(12_000_000, OUT_W * OUT_H * fps * 0.08);

    fitPreview();

    const audioTrack = buildAudioTrack();
    startAudio();

    if (useHW) {
        try {
            await startHW(audioTrack);
        } catch(e) {
            log('HW sikertelen, fallback: ' + e.message);
            useHW = false;
            startMR(audioTrack, fps, bitrate);
        }
    } else {
        startMR(audioTrack, fps, bitrate);
    }

    btnRecord.classList.add('recording');
    setStatus('● REC');
}

async function stopRec() {
    if (!isRecording) return;
    isRecording = false;
    btnRecord.classList.remove('recording');
    setStatus('Mentés...');

    if (hwRecorder) {
        const blob = await stopHW();
        stopAudio();
        if (blob) onDone(blob, 'mp4');
        else { setStatus(''); }
    } else if (mrRecorder) {
        try { mrRecorder.stop(); } catch(_) {}
        mrRecorder = null;
        stopAudio();
        // onDone az mr.onstop-ból hívódik
    }
}

// ── KÉSZ ─────────────────────────────────────────────────────────────────────
function onDone(blob, ext) {
    lastBlob = blob; lastExt = ext;
    const mb = (blob.size / 1024 / 1024).toFixed(1);
    doneInfo.textContent = `${ext.toUpperCase()} • ${mb} MB`;
    doneOverlay.classList.add('on');
    setStatus('');
    log(`Kész: ${mb} MB`);
}

// ── VISSZASZÁMLÁLÁS ───────────────────────────────────────────────────────────
function runCountdown(sec, cb) {
    if (sec <= 0) { cb(); return; }
    let n = sec;
    countdown.textContent = n;
    countdown.classList.add('on');
    cdTimer = setInterval(() => {
        n--;
        if (n <= 0) {
            clearInterval(cdTimer);
            countdown.classList.remove('on');
            cb();
        } else {
            countdown.textContent = n;
        }
    }, 1000);
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
btnRecord.disabled = true;
btnRecord.addEventListener('click', () => {
    if (isRecording) {
        if (cdTimer) { clearInterval(cdTimer); cdTimer = null; countdown.classList.remove('on'); }
        stopRec();
    } else {
        const sec = parseInt(inputCountdown.value, 10) || 0;
        runCountdown(sec, startRec);
    }
});

btnStart.addEventListener('click', async () => {
    btnStart.disabled = true;
    btnStart.textContent = 'Kamera indítás...';
    // engedélykérés
    try {
        const tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        tmp.getTracks().forEach(t => t.stop());
    } catch(e) {
        log('Engedély hiba: ' + e.message);
        btnStart.disabled = false; btnStart.textContent = 'INDÍTÁS'; return;
    }
    await refreshCams();
    const ok = await startCamera();
    if (!ok) { btnStart.disabled = false; btnStart.textContent = 'INDÍTÁS'; return; }
    startOverlay.classList.add('gone');
    // fullscreen (user gesture-ből)
    try {
        const el = document.documentElement;
        if (el.requestFullscreen) await el.requestFullscreen({ navigationUI: 'hide' });
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    } catch(_) {}
});

// settings
btnSettings.addEventListener('click', () => {
    settingsDrawer.classList.add('on');
    settingsBackdrop.classList.add('on');
});
[btnCloseSettings, settingsBackdrop].forEach(el =>
    el.addEventListener('click', () => {
        settingsDrawer.classList.remove('on');
        settingsBackdrop.classList.remove('on');
    })
);
camSelect.addEventListener('change', () => { if (cameraStream) startCamera(); });
overlayFile.addEventListener('change', () => {
    const f = overlayFile.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = e => loadOverlay(e.target.result, f.name);
    r.readAsDataURL(f);
});
musicFile.addEventListener('change', async () => {
    const f = musicFile.files[0]; if (!f) return;
    try { await decodeAudio(await f.arrayBuffer(), f.name); }
    catch(e) { log('Zene hiba: ' + e.message); }
});

// done overlay gombok
btnDownload.addEventListener('click', () => {
    if (!lastBlob) return;
    const url = URL.createObjectURL(lastBlob);
    const now = new Date();
    const name = `KANDO_360_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}.${lastExt}`;
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 30000);
});
btnNewRec.addEventListener('click', () => {
    lastBlob = null;
    doneOverlay.classList.remove('on');
    setStatus('');
});

// ── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize', fitPreview);
fitPreview();
detectHW();
loadOverlay(DEFAULT_OVERLAY + '?v=' + Date.now(), DEFAULT_OVERLAY);
loadDefaultAudio();
</script>
